<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KursiKita - Toko Kursi Online</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <header>
        <div class="logo">
            <h1>🪑 KursiKita</h1>
        </div>
        <div class="nav">
            <a href="index.html">Beranda</a>
            <a href="keranjang.html">Keranjang 🛒</a>
            <a href="login.html" id="loginLink">Login</a>
            <a href="register.html" id="registerLink">Daftar</a>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <h2>Kursi Berkualitas untuk Rumah dan Kantor Anda</h2>
        <p>Diskon hingga 50% untuk pembelian pertama!</p>
    </section>

    <!-- Filter Kategori -->
    <section class="filter">
        <button class="filter-btn active" data-kategori="all">Semua</button>
        <button class="filter-btn" data-kategori="kantor">Kursi Kantor</button>
        <button class="filter-btn" data-kategori="rumah">Kursi Rumah</button>
        <button class="filter-btn" data-kategori="taman">Kursi Taman</button>
    </section>

    <!-- Pencarian -->
    <section class="search">
        <input type="text" id="searchInput" placeholder="Cari kursi...">
    </section>

    <!-- Daftar Produk -->
    <section class="products" id="productsList">
        <!-- Produk akan di-load dari JavaScript -->
    </section>

    <script src="script.js"></script>
</body>
</html>
