<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - KursiKita</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">
            <h1>🪑 KursiKita</h1>
        </div>
        <div class="nav">
            <a href="index.html">Beranda</a>
            <a href="login.html">Login</a>
            <a href="register.html">Daftar</a>
        </div>
    </header>

    <section style="max-width:400px; margin:100px auto; background:white; padding:30px; border-radius:10px">
        <h2>Login</h2>
        <form id="loginForm">
            <input type="email" id="email" placeholder="Email" style="width:100%; padding:10px; margin:10px 0; border:1px solid #ddd; border-radius:5px" required>
            <input type="password" id="password" placeholder="Password" style="width:100%; padding:10px; margin:10px 0; border:1px solid #ddd; border-radius:5px" required>
            <button type="submit" style="width:100%; padding:10px; background:#5D4037; color:white; border:none; border-radius:5px; cursor:pointer">Login</button>
        </form>
        <p id="message" style="color:red; margin-top:10px"></p>
        <p>Belum punya akun? <a href="register.html">Daftar di sini</a></p>
    </section>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Simulasi login (untuk demo)
            if (email === "admin@kursikita.com" && password === "admin123") {
                localStorage.setItem('user', JSON.stringify({email: email, role: 'admin'}));
                alert('Login berhasil!');
                window.location.href = 'index.html';
            } else if (email && password) {
                // Simulasi login customer
                localStorage.setItem('user', JSON.stringify({email: email, role: 'customer'}));
                alert('Login berhasil!');
                window.location.href = 'index.html';
            } else {
                document.getElementById('message').innerHTML = 'Email atau password salah!';
            }
        });
    </script>
</body>
</html>
