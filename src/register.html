<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - KursiKita</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">
            <h1>🪑 KursiKita</h1>
        </div>
        <div class="nav">
            <a href="index.html">Beranda</a>
            <a href="login.html">Login</a>
            <a href="register.html">Daftar</a>
        </div>
    </header>

    <section style="max-width:400px; margin:50px auto; background:white; padding:30px; border-radius:10px">
        <h2>Daftar Akun Baru</h2>
        <form id="registerForm">
            <input type="text" id="nama" placeholder="Nama Lengkap" style="width:100%; padding:10px; margin:10px 0; border:1px solid #ddd; border-radius:5px" required>
            <input type="email" id="email" placeholder="Email" style="width:100%; padding:10px; margin:10px 0; border:1px solid #ddd; border-radius:5px" required>
            <input type="text" id="alamat" placeholder="Alamat" style="width:100%; padding:10px; margin:10px 0; border:1px solid #ddd; border-radius:5px" required>
            <input type="tel" id="phone" placeholder="No. Telepon" style="width:100%; padding:10px; margin:10px 0; border:1px solid #ddd; border-radius:5px" required>
            <input type="password" id="password" placeholder="Password" style="width:100%; padding:10px; margin:10px 0; border:1px solid #ddd; border-radius:5px" required>
            <button type="submit" style="width:100%; padding:10px; background:#5D4037; color:white; border:none; border-radius:5px; cursor:pointer">Daftar</button>
        </form>
        <p id="message" style="color:green; margin-top:10px"></p>
        <p>Sudah punya akun? <a href="login.html">Login di sini</a></p>
    </section>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            
            // Simulasi registrasi
            const kodeVerifikasi = Math.floor(100000 + Math.random() * 900000);
            alert(`Kode verifikasi Anda: ${kodeVerifikasi}\n(Catatan: Di aplikasi nyata, kode dikirim ke email)`);
            
            const kodeInput = prompt('Masukkan kode verifikasi:');
            if (kodeInput === kodeVerifikasi.toString()) {
                localStorage.setItem('user', JSON.stringify({email: email, verified: true}));
                document.getElementById('message').innerHTML = 'Registrasi berhasil! Silakan login.';
                setTimeout(() => { window.location.href = 'login.html'; }, 2000);
            } else {
                document.getElementById('message').style.color = 'red';
                document.getElementById('message').innerHTML = 'Kode verifikasi salah!';
            }
        });
    </script>
</body>
</html>
